<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>World Clock - Multi Timezone</title>\n    <link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap\" rel=\"stylesheet\">\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        html, body {\n            height: 100%;\n            width: 100%;\n            font-family: 'Poppins', sans-serif;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            color: #fff;\n            overflow-x: hidden;\n            transition: background 0.3s ease;\n        }\n\n        body.dark-mode {\n            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);\n        }\n\n        /* ==================== HEADER ==================== */\n        .header {\n            background: rgba(0, 0, 0, 0.2);\n            padding: 20px;\n            text-align: center;\n            backdrop-filter: blur(10px);\n            border-bottom: 1px solid rgba(255, 255, 255, 0.1);\n        }\n\n        .header h1 {\n            font-size: 32px;\n            font-weight: 700;\n            margin-bottom: 5px;\n            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);\n        }\n\n        .header p {\n            font-size: 14px;\n            opacity: 0.9;\n            font-weight: 300;\n        }\n\n        /* ==================== CONTAINER ==================== */\n        .container {\n            max-width: 1200px;\n            margin: 0 auto;\n            padding: 30px 20px;\n        }\n\n        /* ==================== CONTROLS ==================== */\n        .controls {\n            display: flex;\n            gap: 10px;\n            margin-bottom: 30px;\n            flex-wrap: wrap;\n            justify-content: center;\n        }\n\n        .btn {\n            padding: 12px 25px;\n            border: 2px solid rgba(255, 255, 255, 0.3);\n            background: rgba(255, 255, 255, 0.1);\n            color: white;\n            border-radius: 25px;\n            cursor: pointer;\n            font-size: 14px;\n            font-weight: 600;\n            transition: all 0.3s ease;\n            backdrop-filter: blur(10px);\n            font-family: 'Poppins', sans-serif;\n        }\n\n        .btn:hover {\n            background: rgba(255, 255, 255, 0.2);\n            border-color: rgba(255, 255, 255, 0.5);\n            transform: translateY(-2px);\n        }\n\n        .btn.active {\n            background: rgba(255, 255, 255, 0.3);\n            border-color: white;\n        }\n\n        /* ==================== CLOCKS GRID ==================== */\n        .clocks-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n            gap: 20px;\n            margin-bottom: 30px;\n        }\n\n        /* ==================== CLOCK CARD ==================== */\n        .clock-card {\n            background: rgba(255, 255, 255, 0.1);\n            backdrop-filter: blur(20px);\n            border: 2px solid rgba(255, 255, 255, 0.2);\n            border-radius: 20px;\n            padding: 30px;\n            text-align: center;\n            transition: all 0.3s ease;\n            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);\n        }\n\n        .clock-card:hover {\n            background: rgba(255, 255, 255, 0.15);\n            border-color: rgba(255, 255, 255, 0.4);\n            transform: translateY(-5px);\n            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);\n        }\n\n        body.dark-mode .clock-card {\n            background: rgba(255, 255, 255, 0.05);\n            border-color: rgba(255, 255, 255, 0.1);\n        }\n\n        body.dark-mode .clock-card:hover {\n            background: rgba(255, 255, 255, 0.08);\n            border-color: rgba(255, 255, 255, 0.2);\n        }\n\n        .timezone-name {\n            font-size: 20px;\n            font-weight: 700;\n            margin-bottom: 10px;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n\n        .timezone-region {\n            font-size: 12px;\n            opacity: 0.8;\n            margin-bottom: 20px;\n            font-weight: 300;\n        }\n\n        /* ==================== DIGITAL CLOCK ==================== */\n        .digital-clock {\n            font-family: 'Space Mono', monospace;\n            font-size: 48px;\n            font-weight: 700;\n            margin-bottom: 15px;\n            letter-spacing: 2px;\n            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);\n            word-spacing: 20px;\n        }\n\n        /* ==================== ANALOG CLOCK ==================== */\n        .analog-clock {\n            width: 150px;\n            height: 150px;\n            border-radius: 50%;\n            background: rgba(255, 255, 255, 0.1);\n            border: 3px solid rgba(255, 255, 255, 0.3);\n            position: relative;\n            margin: 20px auto;\n            box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.2);\n        }\n\n        .center-dot {\n            width: 10px;\n            height: 10px;\n            background: white;\n            border-radius: 50%;\n            position: absolute;\n            top: 50%;\n            left: 50%;\n            transform: translate(-50%, -50%);\n            z-index: 10;\n        }\n\n        .hand {\n            position: absolute;\n            bottom: 50%;\n            left: 50%;\n            transform-origin: bottom center;\n            border-radius: 10px;\n        }\n\n        .hour-hand {\n            width: 6px;\n            height: 40px;\n            background: rgba(255, 255, 255, 0.8);\n            margin-left: -3px;\n        }\n\n        .minute-hand {\n            width: 4px;\n            height: 50px;\n            background: rgba(255, 255, 255, 0.9);\n            margin-left: -2px;\n            animation: pulse 2s ease-in-out infinite;\n        }\n\n        .second-hand {\n            width: 2px;\n            height: 55px;\n            background: #ff6b6b;\n            margin-left: -1px;\n        }\n\n        @keyframes pulse {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.7; }\n        }\n\n        .date-info {\n            font-size: 13px;\n            opacity: 0.9;\n            margin-top: 15px;\n            font-weight: 300;\n        }\n\n        /* ==================== FORMAT TOGGLE ==================== */\n        .format-toggle {\n            display: flex;\n            gap: 10px;\n            justify-content: center;\n            margin-top: 20px;\n        }\n\n        .format-btn {\n            padding: 8px 15px;\n            background: rgba(255, 255, 255, 0.1);\n            border: 1px solid rgba(255, 255, 255, 0.2);\n            color: white;\n            border-radius: 15px;\n            cursor: pointer;\n            font-size: 12px;\n            font-weight: 600;\n            transition: all 0.2s ease;\n            font-family: 'Poppins', sans-serif;\n        }\n\n        .format-btn:hover,\n        .format-btn.active {\n            background: rgba(255, 255, 255, 0.2);\n            border-color: white;\n        }\n\n        /* ==================== THEME TOGGLE ==================== */\n        .theme-toggle {\n            position: fixed;\n            top: 20px;\n            right: 20px;\n            width: 50px;\n            height: 50px;\n            border-radius: 50%;\n            background: rgba(255, 255, 255, 0.2);\n            border: 2px solid rgba(255, 255, 255, 0.3);\n            color: white;\n            font-size: 24px;\n            cursor: pointer;\n            transition: all 0.3s ease;\n            backdrop-filter: blur(10px);\n            z-index: 100;\n        }\n\n        .theme-toggle:hover {\n            background: rgba(255, 255, 255, 0.3);\n            transform: scale(1.1);\n        }\n\n        /* ==================== TIMEZONE LIST ==================== */\n        .timezone-selector {\n            margin-top: 30px;\n            padding: 20px;\n            background: rgba(255, 255, 255, 0.05);\n            backdrop-filter: blur(10px);\n            border-radius: 15px;\n            border: 1px solid rgba(255, 255, 255, 0.1);\n        }\n\n        .timezone-selector h3 {\n            margin-bottom: 15px;\n            font-size: 16px;\n            font-weight: 600;\n        }\n\n        .timezone-options {\n            display: grid;\n            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));\n            gap: 10px;\n        }\n\n        .timezone-option {\n            padding: 10px;\n            background: rgba(255, 255, 255, 0.1);\n            border: 2px solid rgba(255, 255, 255, 0.2);\n            border-radius: 10px;\n            cursor: pointer;\n            font-size: 12px;\n            text-align: center;\n            transition: all 0.2s ease;\n        }\n\n        .timezone-option:hover {\n            background: rgba(255, 255, 255, 0.15);\n            border-color: rgba(255, 255, 255, 0.4);\n        }\n\n        .timezone-option.selected {\n            background: rgba(255, 255, 255, 0.25);\n            border-color: white;\n            font-weight: 600;\n        }\n\n        /* ==================== RESPONSIVE ==================== */\n        @media (max-width: 768px) {\n            .digital-clock {\n                font-size: 36px;\n            }\n\n            .clocks-grid {\n                grid-template-columns: 1fr;\n            }\n\n            .timezone-options {\n                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));\n            }\n        }\n    </style>\n</head>\n<body>\n\n<!-- ==================== HEADER ==================== -->\n<div class=\"header\">\n    <h1>⏰ World Clock</h1>\n    <p>View current time across different time zones</p>\n</div>\n\n<!-- ==================== MAIN CONTAINER ==================== -->\n<div class=\"container\">\n    \n    <!-- ==================== CONTROLS ==================== -->\n    <div class=\"controls\">\n        <button class=\"btn active\" onclick=\"toggleFormat('digital')\">🕐 Digital</button>\n        <button class=\"btn\" onclick=\"toggleFormat('analog')\">🕰️ Analog</button>\n        <button class=\"btn\" onclick=\"toggleFormat('both')\">📊 Both</button>\n        <button class=\"btn\" onclick=\"resetToDefault()\">🔄 Reset</button>\n    </div>\n\n    <!-- ==================== CLOCKS GRID ==================== -->\n    <div class=\"clocks-grid\" id=\"clocksContainer\"></div>\n\n    <!-- ==================== TIMEZONE SELECTOR ==================== -->\n    <div class=\"timezone-selector\">\n        <h3>📍 Add More Time Zones</h3>\n        <div class=\"timezone-options\" id=\"timezoneOptions\"></div>\n    </div>\n\n</div>\n\n<!-- ==================== THEME TOGGLE ==================== -->\n<button class=\"theme-toggle\" id=\"themeToggle\" onclick=\"toggleTheme()\">🌙</button>\n\n<script src=\"js/clock.js\"></script>\n\n</body>\n</html>\n
